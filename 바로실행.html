<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>감상법 제비뽑기</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

*,
*::before,
*::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sky: #e8f4fc;
  --sky-deep: #b8dff5;
  --mint: #d4f5e9;
  --lemon: #fff9c4;
  --peach: #ffe0e8;
  --coral: #ff8fab;
  --coral-dark: #e86b8f;
  --blue: #6ec6ff;
  --blue-dark: #4aabeb;
  --purple: #c9b8ff;
  --ink: #3d4a5c;
  --ink-light: #6b7a8f;
  --white: #ffffff;
  --paper: #fffef8;
  --color-bg: var(--sky);
  --color-paper: var(--paper);
  --color-ink: var(--ink);
  --color-ink-light: var(--ink-light);
  --color-accent: var(--coral);
  --color-accent-hover: var(--coral-dark);
  --color-success: #5cb88a;
  --font-body: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
  --font-title: 'Pretendard', sans-serif;
  --radius: 16px;
  --shadow: 0 4px 0 rgba(61, 74, 92, 0.08), 0 8px 24px rgba(100, 140, 180, 0.15);
  --shadow-pop: 0 6px 0 rgba(232, 107, 143, 0.35);
}

html, body, #app { min-height: 100vh; }

body {
  font-family: var(--font-body);
  color: var(--color-ink);
  line-height: 1.6;
  background: var(--sky);
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255, 200, 220, 0.4) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(180, 230, 255, 0.5) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255, 249, 196, 0.3) 0%, transparent 50%),
    linear-gradient(180deg, #e8f4fc 0%, #f0f8ff 50%, #e8f4fc 100%);
  background-attachment: fixed;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }

.layout {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem;
  position: relative;
}

.main { width: 100%; max-width: 1100px; flex: 1; }

.back-link {
  position: absolute;
  top: 1.5rem;
  left: 1.5rem;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--ink);
  padding: 0.55rem 1.1rem;
  border-radius: 999px;
  background: var(--white);
  border: 2px solid var(--sky-deep);
  box-shadow: 0 3px 0 var(--sky-deep);
  transition: transform 0.15s;
}
.back-link:hover { transform: translateY(-2px); }

/* Main */
.page-main {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
  text-align: center;
  gap: 1.25rem;
}

.page-title {
  font-family: var(--font-title);
  font-size: 3.5rem;
  font-weight: 800;
  line-height: 1.2;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.page-title::after {
  content: ' 🎨';
}

.page-subtitle {
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--ink-light);
  max-width: 420px;
}

.team-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1rem;
  width: 100%;
  max-width: 820px;
  margin: 1rem 0 2rem;
  padding: 1.25rem;
  background: rgba(255, 255, 255, 0.65);
  border-radius: 24px;
  border: 3px solid var(--white);
  box-shadow: var(--shadow);
}

.team-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  padding: 1.4rem 0.8rem;
  background: var(--white);
  border: 3px solid var(--sky-deep);
  border-radius: var(--radius);
  box-shadow: 0 4px 0 var(--sky-deep);
  transition: transform 0.15s, box-shadow 0.15s;
  color: var(--ink);
}
.team-btn:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 6px 0 var(--blue), 0 10px 20px rgba(110, 198, 255, 0.3);
  border-color: var(--blue);
}
.team-btn .num {
  font-size: 2rem;
  font-weight: 800;
  color: var(--coral);
}

.draw-link-fixed {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  padding: 0.8rem 1.6rem;
  background: linear-gradient(180deg, var(--blue) 0%, var(--blue-dark) 100%);
  color: white;
  border-radius: 999px;
  font-size: 0.95rem;
  font-weight: 700;
  border: 3px solid var(--blue-dark);
  box-shadow: 0 5px 0 #3a8fd4;
  transition: transform 0.15s;
}
.draw-link-fixed:hover { transform: translateY(-3px); }

/* Team page */
.team-header { text-align: center; margin-bottom: 1.5rem; }
.team-header h1 {
  font-size: 2rem;
  font-weight: 800;
  color: var(--ink);
  margin-bottom: 0.4rem;
}
.team-count { color: var(--ink-light); font-weight: 500; }
.team-count strong { color: var(--coral); font-size: 1.2rem; font-weight: 800; }
.team-hint { color: var(--blue-dark); font-size: 0.9rem; font-weight: 600; }

.workspace {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 2.5rem;
  width: 100%;
  padding: 2rem;
  background: rgba(255, 255, 255, 0.7);
  border-radius: 24px;
  border: 3px solid white;
  box-shadow: var(--shadow);
  flex-wrap: wrap;
}

.folded-stack {
  display: flex;
  flex-direction: column-reverse;
  min-width: 60px;
  padding: 0.5rem;
}

.folded-note {
  width: 44px;
  height: 34px;
  background: linear-gradient(135deg, var(--lemon), #ffeaa0);
  border: 2px solid #f0d860;
  border-radius: 4px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
  position: relative;
}
.folded-note::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  border-width: 0 14px 14px 0;
  border-style: solid;
  border-color: transparent #f0c840 transparent transparent;
}

.memo-area { display: flex; align-items: flex-end; gap: 1rem; }

.memo-pad {
  width: 210px;
  height: 250px;
  background: linear-gradient(160deg, #fffef8, var(--lemon));
  border: 3px solid #f0e090;
  border-radius: 8px;
  box-shadow: 0 6px 16px rgba(240, 200, 80, 0.25);
  padding: 2rem 1.4rem;
  cursor: pointer;
  transition: transform 0.2s;
  position: relative;
}
.memo-pad:hover { transform: translateY(-5px) rotate(-2deg); }

.memo-lines { display: flex; flex-direction: column; gap: 1.3rem; margin-top: 0.5rem; }
.memo-lines span { height: 2px; background: rgba(240, 200, 100, 0.5); border-radius: 1px; display: block; }

.memo-hint {
  position: absolute;
  bottom: 1.2rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--coral);
  white-space: nowrap;
}

.pencil {
  width: 22px;
  height: 180px;
  position: relative;
  transform: rotate(22deg);
  margin-bottom: 1.5rem;
  filter: drop-shadow(2px 3px 4px rgba(0, 0, 0, 0.12));
}
.pencil-body {
  position: absolute;
  bottom: 18px;
  left: 2px;
  width: 18px;
  height: 140px;
  background: linear-gradient(90deg, #ffb347, #ffd280);
  border-radius: 3px 3px 0 0;
}
.pencil-tip {
  position: absolute;
  bottom: 0;
  left: 5px;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 20px solid #555;
}
.pencil-eraser {
  position: absolute;
  top: 0;
  left: 2px;
  width: 18px;
  height: 16px;
  background: linear-gradient(to bottom, #ff9eb5, #ff7a9a);
  border-radius: 3px 3px 0 0;
}

/* Submitted list */
.submitted-panel {
  flex: 1;
  min-width: 260px;
  max-width: 360px;
}
.submitted-panel h3 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 0.75rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px dashed var(--sky-deep);
}
.submitted-empty {
  font-size: 0.9rem;
  color: var(--ink-light);
  padding: 1rem;
  text-align: center;
  background: var(--mint);
  border-radius: 12px;
}
.submitted-item {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  padding: 0.75rem;
  margin-bottom: 0.5rem;
  background: var(--white);
  border: 2px solid var(--peach);
  border-radius: 12px;
  box-shadow: 0 2px 0 rgba(255, 143, 171, 0.2);
}
.submitted-text {
  flex: 1;
  font-size: 0.9rem;
  line-height: 1.5;
  color: var(--ink);
  word-break: break-word;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.btn-delete {
  flex-shrink: 0;
  padding: 0.35rem 0.65rem;
  font-size: 0.8rem;
  font-weight: 700;
  color: white;
  background: #ff7b7b;
  border: 2px solid #e85a5a;
  border-radius: 8px;
  box-shadow: 0 3px 0 #d04545;
  transition: transform 0.1s;
}
.btn-delete:hover { transform: translateY(-1px); }

/* Modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(61, 74, 92, 0.35);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal {
  background: var(--white);
  border-radius: 20px;
  padding: 2rem;
  width: 90%;
  max-width: 460px;
  min-height: 300px;
  box-shadow: 0 12px 40px rgba(100, 140, 180, 0.25);
  border: 3px solid var(--sky-deep);
}
.modal h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 0.25rem; }
.modal-guide { font-size: 0.85rem; font-weight: 600; color: var(--blue-dark); margin-bottom: 1rem; }
.modal textarea {
  width: 100%;
  padding: 1rem;
  border: 2px solid var(--sky-deep);
  border-radius: 12px;
  background: #fafcff;
  font-family: var(--font-body);
  font-size: 1rem;
  line-height: 1.7;
  resize: vertical;
  margin-bottom: 1rem;
  color: var(--ink);
}
.modal textarea:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(110, 198, 255, 0.3);
}
.modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
.btn-cancel {
  padding: 0.6rem 1.2rem;
  border-radius: 10px;
  font-weight: 600;
  color: var(--ink-light);
  background: var(--sky);
  border: 2px solid var(--sky-deep);
}
.btn-submit {
  padding: 0.6rem 1.4rem;
  border-radius: 10px;
  font-weight: 700;
  background: linear-gradient(180deg, var(--coral), var(--coral-dark));
  color: white;
  border: 2px solid var(--coral-dark);
  box-shadow: var(--shadow-pop);
}
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

.fold-anim-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 220px;
  perspective: 800px;
}
.fold-paper {
  width: 190px;
  height: 170px;
  background: linear-gradient(145deg, #fffef8, var(--lemon));
  border: 2px solid #f0e090;
  padding: 1rem;
  border-radius: 6px;
  box-shadow: 0 4px 12px rgba(240, 200, 80, 0.3);
  transform-origin: center top;
  transition: transform 0.7s ease-in-out, width 0.3s 0.5s, height 0.3s 0.5s;
  overflow: hidden;
}
.fold-paper.folding { transform: rotateX(90deg) scaleY(0.3); }
.fold-paper.folded { width: 52px; height: 40px; transform: rotateX(0deg) rotate(-3deg); padding: 0; }
.fold-paper.folded p { display: none; }
.fold-paper p { font-size: 1rem; line-height: 1.6; }
.sent-text { margin-top: 1.2rem; font-weight: 800; font-size: 1.1rem; color: var(--color-success); }

/* Draw */
.draw-page { max-width: 700px; margin: 0 auto; text-align: center; padding-bottom: 3rem; }
.draw-title { font-size: 2.5rem; font-weight: 800; color: var(--ink); }
.draw-subtitle { color: var(--ink-light); font-weight: 500; margin-bottom: 1.5rem; }

.stats { display: flex; gap: 0.75rem; justify-content: center; margin: 1.25rem 0; flex-wrap: wrap; }
.stat-card {
  padding: 1rem 1.25rem;
  background: var(--white);
  border-radius: 14px;
  border: 3px solid var(--mint);
  min-width: 95px;
  box-shadow: 0 4px 0 #a8e8d0;
}
.stat-card .label { font-size: 0.75rem; font-weight: 600; color: var(--ink-light); display: block; }
.stat-card .value { font-size: 1.4rem; font-weight: 800; color: var(--coral); }

.warning-box {
  background: var(--lemon);
  border: 2px solid #f0d860;
  color: #8a7020;
  padding: 0.75rem 1rem;
  border-radius: 12px;
  margin-bottom: 1rem;
  font-size: 0.9rem;
  font-weight: 600;
}
.error-box {
  background: #ffe8e8;
  border: 2px solid #ffb0b0;
  color: #c04040;
  padding: 0.75rem 1rem;
  border-radius: 12px;
  margin-bottom: 1rem;
  font-weight: 600;
}

.pool {
  min-height: 160px;
  margin: 1.5rem auto;
  padding: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 0.5rem;
  background: rgba(255, 255, 255, 0.6);
  border-radius: 16px;
  border: 2px dashed var(--sky-deep);
}
.pool-note {
  width: 50px;
  height: 38px;
  background: linear-gradient(135deg, var(--lemon), #ffe080);
  border: 2px solid #f0d860;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--ink-light);
}
.pool.shuffling .pool-note { animation: shuffle 1.2s ease-in-out infinite; }
@keyframes shuffle {
  0%, 100% { transform: translate(0, 0) rotate(0); }
  50% { transform: translate(8px, -12px) rotate(10deg); }
}

.option-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  margin: 1rem 0;
  padding: 0.65rem 1.2rem;
  background: var(--white);
  border: 3px solid var(--purple);
  border-radius: 999px;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  box-shadow: 0 4px 0 #b0a0e8;
  transition: transform 0.15s, background 0.15s;
  user-select: none;
}
.option-toggle:hover { transform: translateY(-2px); }
.option-toggle.active {
  background: var(--purple);
  color: white;
  border-color: #a898e8;
}
.option-toggle input {
  width: 18px;
  height: 18px;
  accent-color: var(--coral);
  cursor: pointer;
}

.btn-draw {
  padding: 1rem 2.5rem;
  font-size: 1.1rem;
  font-weight: 800;
  background: linear-gradient(180deg, var(--coral), var(--coral-dark));
  color: white;
  border-radius: 999px;
  border: 3px solid var(--coral-dark);
  box-shadow: var(--shadow-pop);
  transition: transform 0.15s;
}
.btn-draw:hover:not(:disabled) { transform: translateY(-3px) scale(1.02); }
.btn-draw:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; transform: none; }

.reset-section {
  margin-top: 2.5rem;
  padding-top: 1.5rem;
  border-top: 2px dashed var(--sky-deep);
}
.btn-reset {
  padding: 0.5rem 1rem;
  font-size: 0.85rem;
  font-weight: 700;
  color: #c05050;
  border: 2px solid #ffb0b0;
  border-radius: 10px;
  background: #fff5f5;
}
.reset-hint {
  font-size: 0.8rem;
  color: var(--ink-light);
  margin-top: 0.5rem;
  line-height: 1.5;
}

/* Result */
.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
  gap: 1.25rem;
  margin: 1.5rem 0;
}
.result-section {
  background: var(--white);
  border: 3px solid var(--peach);
  border-radius: 18px;
  padding: 1.2rem;
  box-shadow: 0 4px 0 rgba(255, 143, 171, 0.25);
}
.result-section h2 {
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--coral);
  margin-bottom: 0.75rem;
  padding-bottom: 0.4rem;
  border-bottom: 2px dashed var(--peach);
}
.note-card {
  min-height: 68px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  margin-bottom: 0.6rem;
  transition: transform 0.15s;
}
.note-card:hover { transform: scale(1.02); }
.note-folded {
  height: 68px;
  background: linear-gradient(135deg, var(--lemon), #ffe080);
  border: 2px solid #f0d860;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  font-weight: 700;
}
.note-folded::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  border-width: 0 18px 18px 0;
  border-style: solid;
  border-color: transparent #f0c840 transparent transparent;
}
.note-unfolded {
  background: var(--paper);
  border: 2px solid var(--lemon);
  padding: 1rem;
  border-radius: 10px;
  animation: unfold 0.5s ease;
}
@keyframes unfold {
  0% { transform: scaleY(0.4); opacity: 0.6; }
  100% { transform: scaleY(1); opacity: 1; }
}
.note-unfolded p { font-size: 1rem; line-height: 1.65; white-space: pre-wrap; }
.note-author { display: block; margin-top: 0.4rem; font-size: 0.8rem; color: var(--ink-light); }

.result-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
.btn-primary {
  padding: 0.7rem 1.5rem;
  border-radius: 999px;
  font-weight: 700;
  background: linear-gradient(180deg, var(--coral), var(--coral-dark));
  color: white;
  border: 3px solid var(--coral-dark);
  box-shadow: var(--shadow-pop);
}
.btn-dark {
  padding: 0.7rem 1.5rem;
  border-radius: 999px;
  font-weight: 700;
  background: linear-gradient(180deg, var(--blue), var(--blue-dark));
  color: white;
  border: 3px solid var(--blue-dark);
  box-shadow: 0 5px 0 #3a8fd4;
}
.toggle-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--ink-light);
  margin-bottom: 1rem;
  cursor: pointer;
}
.toggle-label input { accent-color: var(--coral); width: 18px; height: 18px; }

@media (max-width: 900px) {
  .team-grid { grid-template-columns: repeat(3, 1fr); }
  .page-title { font-size: 2.8rem; }
}
@media (max-width: 700px) {
  .workspace { flex-direction: column; align-items: center; }
  .submitted-panel { max-width: 100%; width: 100%; }
}

</style>
</head>
<body>
<p style="text-align:center;padding:0.75rem;background:#fff3cd;color:#856404;font-weight:700;margin:0">
  ⚠ 여러 기기 연동(공유 링크)은 이 파일이 아니라 <code>npm run dev</code> 로 실행하세요
</p>
<div id="app"><p style="text-align:center;padding:3rem;color:#6b7a8f">로딩 중...</p></div>
<script>
var TEAM_NAMES = ['1팀', '2팀', '3팀', '4팀', '5팀'];
var TEAM_COUNT = 5;
var DRAW_COUNT_PER_TEAM = 3;
var SHOW_AUTHOR_TEAM = false;
var MIN_SUBMISSIONS_HINT = 3;

var STORAGE_KEYS = {
  submissions: 'appreciation_submissions',
  drawResult: 'appreciation_draw_result',
  excludeOwnTeam: 'appreciation_exclude_own_team',
};

function getExcludeOwnTeam() {
  try {
    var v = localStorage.getItem(STORAGE_KEYS.excludeOwnTeam);
    if (v === null) return false;
    return v === 'true';
  } catch (e) {
    return false;
  }
}

function setExcludeOwnTeam(value) {
  localStorage.setItem(STORAGE_KEYS.excludeOwnTeam, value ? 'true' : 'false');
}

function getSubmissions() {
  try {
    var raw = localStorage.getItem(STORAGE_KEYS.submissions);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function saveSubmissions(submissions) {
  localStorage.setItem(STORAGE_KEYS.submissions, JSON.stringify(submissions));
}

function addSubmission(data) {
  var submissions = getSubmissions();
  var id = String(Date.now()) + '-' + Math.random().toString(36).slice(2);
  if (window.crypto && crypto.randomUUID) {
    id = crypto.randomUUID();
  }
  var entry = {
    id: id,
    teamId: Number(data.teamId),
    text: data.text.trim(),
    createdAt: Date.now(),
    drawnByTeam: null,
  };
  submissions.push(entry);
  saveSubmissions(submissions);
  return entry;
}

function deleteSubmission(id) {
  var submissions = getSubmissions().filter(function (s) {
    return s.id !== id;
  });
  saveSubmissions(submissions);
}

function getTeamSubmissions(teamId) {
  return getSubmissions().filter(function (s) {
    return s.teamId === Number(teamId);
  });
}

function getDrawResult() {
  try {
    var raw = localStorage.getItem(STORAGE_KEYS.drawResult);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

function saveDrawResult(result) {
  localStorage.setItem(STORAGE_KEYS.drawResult, JSON.stringify(result));
}

function clearAllData() {
  localStorage.removeItem(STORAGE_KEYS.submissions);
  localStorage.removeItem(STORAGE_KEYS.drawResult);
}

function getTeamSubmissionCount(teamId) {
  return getTeamSubmissions(teamId).length;
}

function fisherYatesShuffle(array) {
  var arr = array.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
  return arr;
}

function getRequiredSubmissionCount() {
  return TEAM_COUNT * DRAW_COUNT_PER_TEAM;
}

function getSubmissionShortage() {
  return Math.max(0, getRequiredSubmissionCount() - getSubmissions().length);
}

function performDraw() {
  var allSubmissions = getSubmissions();
  var required = getRequiredSubmissionCount();

  if (allSubmissions.length < required) {
    return {
      success: false,
      error: '전체 쪽지가 부족합니다. ' + required + '개 이상 필요하며, 현재 ' + allSubmissions.length + '개입니다.',
    };
  }

  var pool = fisherYatesShuffle(allSubmissions);
  var result = {};
  var teamId, assigned, candidate, t;

  for (teamId = 1; teamId <= TEAM_COUNT; teamId++) {
    assigned = [];

    while (assigned.length < DRAW_COUNT_PER_TEAM) {
      if (pool.length === 0) {
        return { success: false, error: '추첨 풀이 부족합니다.' };
      }

      candidate = pool.shift();

      if (getExcludeOwnTeam() && candidate.teamId === teamId) {
        pool.push(candidate);
        var hasOther = false;
        for (t = 0; t < pool.length; t++) {
          if (pool[t].teamId !== teamId) {
            hasOther = true;
            break;
          }
        }
        if (!hasOther) {
          return {
            success: false,
            error: teamId + '팀에게 배정할 다른 팀의 쪽지가 부족합니다.',
          };
        }
        continue;
      }

      assigned.push({
        id: candidate.id,
        text: candidate.text,
        authorTeamId: candidate.teamId,
      });
      candidate.drawnByTeam = teamId;
    }

    result[teamId] = assigned;
  }

  saveSubmissions(allSubmissions);
  saveDrawResult(result);
  return { success: true, result: result };
}

var app;

function navigate(path) {
  location.hash = path;
}

function getRoute() {
  var hash = location.hash.slice(1) || '/';
  if (hash.indexOf('/team/') === 0) {
    return { page: 'team', teamId: Number(hash.split('/')[2]) };
  }
  if (hash === '/draw') return { page: 'draw' };
  if (hash === '/result') return { page: 'result' };
  return { page: 'main' };
}

function layout(content, showBack, backTo) {
  var back = showBack
    ? '<a href="#" class="back-link" data-nav="' + backTo + '">← 메인으로</a>'
    : '';
  return '<div class="layout">' + back + '<main class="main">' + content + '</main></div>';
}

function renderMain() {
  var teams = TEAM_NAMES.map(function (name, i) {
    return (
      '<a href="#" class="team-btn" data-nav="/team/' + (i + 1) + '">' +
      '<span class="num">' + (i + 1) + '</span><span>' + name + '</span></a>'
    );
  }).join('');

  app.innerHTML = layout(
    '<div class="page-main">' +
    '<h1 class="page-title">감상법 제비뽑기</h1>' +
    '<p class="page-subtitle">팀별로 감상법을 작성하고, 추첨으로 다른 팀의 감상법을 받아보세요</p>' +
    '<div class="team-grid">' + teams + '</div>' +
    '<a href="#" class="draw-link-fixed" data-nav="/draw">추첨하러 가기 →</a>' +
    '</div>',
    false
  );
}

function renderTeam(teamId) {
  var teamIndex = teamId - 1;
  if (teamIndex < 0 || teamIndex >= TEAM_NAMES.length) {
    navigate('/');
    return;
  }

  var teamName = TEAM_NAMES[teamIndex];
  var count = getTeamSubmissionCount(teamId);
  var submissions = getTeamSubmissions(teamId);
  var needsMore = count < MIN_SUBMISSIONS_HINT;
  var folded = '';

  for (var i = 0; i < count; i++) {
    var rot = -5 + (i % 3) * 5;
    var off = i * 6;
    folded += '<div class="folded-note" style="transform:translateX(' + off + 'px) rotate(' + rot + 'deg);z-index:' + i + '"></div>';
  }

  var submittedList = '';
  if (submissions.length === 0) {
    submittedList = '<p class="submitted-empty">아직 쪽지가 없어요!<br>메모지를 눌러 작성해보세요 ✏️</p>';
  } else {
    submittedList = submissions.map(function (s, idx) {
      var preview = s.text.length > 60 ? s.text.slice(0, 60) + '…' : s.text;
      return (
        '<div class="submitted-item">' +
        '<p class="submitted-text"><strong>쪽지 ' + (idx + 1) + '</strong> ' + escapeHtml(preview) + '</p>' +
        '<button type="button" class="btn-delete" data-delete-id="' + s.id + '">삭제</button>' +
        '</div>'
      );
    }).join('');
  }

  app.innerHTML = layout(
    '<div class="team-header"><h1>' + teamName + '</h1>' +
    '<p class="team-count">제출한 감상법: <strong>' + count + '개</strong>' +
    (needsMore ? '<span class="team-hint"> (최소 ' + MIN_SUBMISSIONS_HINT + '개 이상 작성해주세요)</span>' : '') +
    '</p></div>' +
    '<div class="workspace">' +
    '<div class="memo-area">' +
    '<button type="button" class="memo-pad" id="open-modal">' +
    '<div class="memo-lines"><span></span><span></span><span></span><span></span></div>' +
    '<span class="memo-hint">클릭하여 작성</span></button>' +
    '<div class="pencil" aria-hidden="true"><div class="pencil-eraser"></div>' +
    '<div class="pencil-body"></div><div class="pencil-tip"></div></div>' +
    '<div class="folded-stack">' + folded + '</div></div>' +
    '<div class="submitted-panel"><h3>📝 내가 쓴 쪽지</h3>' + submittedList + '</div>' +
    '</div>' +
    '<div id="modal-root"></div>',
    true,
    '/'
  );

  document.getElementById('open-modal').onclick = function () {
    openWriteModal(teamId, teamName);
  };

  var deleteBtns = document.querySelectorAll('[data-delete-id]');
  for (var d = 0; d < deleteBtns.length; d++) {
    deleteBtns[d].onclick = function () {
      var id = this.getAttribute('data-delete-id');
      if (confirm('이 쪽지를 삭제할까요?')) {
        deleteSubmission(id);
        renderTeam(teamId);
        bindNavLinks();
      }
    };
  }
}

function openWriteModal(teamId, teamName) {
  var root = document.getElementById('modal-root');
  root.innerHTML =
    '<div class="modal-backdrop" id="modal-backdrop"><div class="modal" id="modal-inner">' +
    '<h2>' + teamName + ' — 감상법 작성</h2>' +
    '<p class="modal-guide">최소 3개 이상 작성해주세요</p>' +
    '<textarea id="memo-text" rows="6" placeholder="이 작품을 어떻게 감상하면 좋을지 적어주세요."></textarea>' +
    '<div class="modal-actions">' +
    '<button type="button" class="btn-cancel" id="modal-cancel">취소</button>' +
    '<button type="button" class="btn-submit" id="modal-submit" disabled>제출하기</button>' +
    '</div></div></div>';

  var textarea = document.getElementById('memo-text');
  var submitBtn = document.getElementById('modal-submit');
  var backdrop = document.getElementById('modal-backdrop');
  var inner = document.getElementById('modal-inner');

  textarea.focus();
  textarea.oninput = function () {
    submitBtn.disabled = !textarea.value.trim();
  };

  document.getElementById('modal-cancel').onclick = function () {
    root.innerHTML = '';
  };
  backdrop.onclick = function (e) {
    if (e.target === backdrop) root.innerHTML = '';
  };

  submitBtn.onclick = function () {
    var text = textarea.value.trim();
    if (!text) return;

    inner.innerHTML =
      '<div class="fold-anim-area"><div class="fold-paper" id="fold-paper"><p>' +
      escapeHtml(text) +
      '</p></div><p class="sent-text" id="sent-text" style="display:none">전송완료</p></div>';

    var paper = document.getElementById('fold-paper');
    setTimeout(function () {
      paper.className += ' folding';
    }, 50);

    setTimeout(function () {
      paper.className += ' folded';
      document.getElementById('sent-text').style.display = 'block';
    }, 700);

    setTimeout(function () {
      addSubmission({ teamId: teamId, text: text });
      root.innerHTML = '';
      renderTeam(teamId);
      bindNavLinks();
    }, 2200);
  };
}

function renderDraw() {
  var submissions = getSubmissions();
  var required = getRequiredSubmissionCount();
  var shortage = getSubmissionShortage();
  var canDraw = shortage === 0;
  var poolNotes = submissions.slice(0, 20).map(function (s) {
    return '<div class="pool-note">' + s.teamId + '팀</div>';
  }).join('');

  var excludeOwn = getExcludeOwnTeam();

  app.innerHTML = layout(
    '<div class="draw-page"><h1 class="draw-title">추첨</h1>' +
    '<p class="draw-subtitle">진행자 전용 화면</p>' +
    '<div class="stats">' +
    '<div class="stat-card"><span class="label">전체 제출</span><span class="value">' + submissions.length + '개</span></div>' +
    '<div class="stat-card"><span class="label">필요 수량</span><span class="value">' + required + '개</span></div>' +
    '<div class="stat-card"><span class="label">팀당 배정</span><span class="value">' + DRAW_COUNT_PER_TEAM + '개</span></div>' +
    '</div>' +
    (!canDraw ? '<div class="warning-box">⚠ 쪽지가 ' + shortage + '개 부족해요! (5팀 × 3개 = 15개 필요)</div>' : '') +
    '<div id="draw-error"></div>' +
    '<div class="pool" id="pool">' + (poolNotes || '<p style="color:var(--ink-light)">아직 제출된 쪽지가 없어요</p>') + '</div>' +
    '<label class="option-toggle' + (excludeOwn ? ' active' : '') + '" id="exclude-toggle">' +
    '<input type="checkbox" id="exclude-checkbox"' + (excludeOwn ? ' checked' : '') + ' />' +
    '자기 팀 쪽지 제외하기</label><br>' +
    '<button type="button" class="btn-draw" id="btn-draw"' + (canDraw ? '' : ' disabled') + '>추첨하기 🎲</button>' +
    '<div class="reset-section"><button type="button" class="btn-reset" id="btn-reset">데이터 초기화</button>' +
    '<p class="reset-hint">제출한 쪽지와 추첨 결과가 <strong>모두 삭제</strong>됩니다.<br>다음 회차 시작 전에만 눌러주세요.</p></div></div>',
    true,
    '/'
  );

  document.getElementById('exclude-checkbox').onchange = function (e) {
    setExcludeOwnTeam(e.target.checked);
    var toggle = document.getElementById('exclude-toggle');
    if (e.target.checked) toggle.className = 'option-toggle active';
    else toggle.className = 'option-toggle';
  };

  document.getElementById('exclude-toggle').onclick = function (e) {
    if (e.target.tagName !== 'INPUT') {
      var cb = document.getElementById('exclude-checkbox');
      cb.checked = !cb.checked;
      setExcludeOwnTeam(cb.checked);
      this.className = cb.checked ? 'option-toggle active' : 'option-toggle';
    }
  };

  document.getElementById('btn-draw').onclick = function () {
    var pool = document.getElementById('pool');
    var err = document.getElementById('draw-error');
    err.innerHTML = '';
    pool.className += ' shuffling';
    document.getElementById('btn-draw').disabled = true;
    document.getElementById('btn-draw').textContent = '추첨 중...';

    setTimeout(function () {
      var drawResult = performDraw();
      pool.className = pool.className.replace(' shuffling', '');
      if (!drawResult.success) {
        err.innerHTML = '<div class="error-box">' + drawResult.error + '</div>';
        document.getElementById('btn-draw').disabled = !canDraw;
        document.getElementById('btn-draw').textContent = '추첨하기';
        return;
      }
      navigate('/result');
    }, 1500);
  };

  document.getElementById('btn-reset').onclick = function () {
    if (confirm('제출한 모든 쪽지와 추첨 결과를 삭제할까요?\n\n삭제하면 되돌릴 수 없어요!')) {
      clearAllData();
      renderDraw();
      bindNavLinks();
    }
  };
}

function renderResult() {
  var result = getDrawResult();
  if (!result) {
    app.innerHTML = layout(
      '<div style="text-align:center;padding:4rem">' +
      '<p style="margin-bottom:1.5rem;color:var(--color-ink-light)">아직 추첨 결과가 없습니다.</p>' +
      '<a href="#" class="btn-primary" data-nav="/draw">추첨하러 가기</a></div>',
      true,
      '/'
    );
    return;
  }

  var showAuthor = SHOW_AUTHOR_TEAM;
  var sections = '';

  for (var i = 0; i < TEAM_COUNT; i++) {
    var teamId = i + 1;
    var notes = result[teamId] || [];
    var cards = notes.map(function (note, idx) {
      return (
        '<div class="note-card" data-reveal="' + teamId + '-' + idx + '">' +
        '<div class="note-folded"><span>쪽지 ' + (idx + 1) + '</span>' +
        '<small style="font-size:0.75rem;color:var(--color-ink-light)">클릭하여 펼치기</small></div></div>'
      );
    }).join('');

    sections += '<section class="result-section"><h2>' + TEAM_NAMES[i] + '</h2>' + cards + '</section>';
  }

  app.innerHTML = layout(
    '<h1 class="draw-title" style="text-align:center">추첨 결과</h1>' +
    '<label class="toggle-label"><input type="checkbox" id="show-author"' + (showAuthor ? ' checked' : '') + '> 작성 팀 표시</label>' +
    '<div class="result-grid">' + sections + '</div>' +
    '<div class="result-actions">' +
    '<a href="#" class="btn-primary" data-nav="/draw">다시 추첨</a>' +
    '<a href="#" class="btn-dark" data-nav="/">메인으로</a></div>',
    true,
    '/'
  );

  document.getElementById('show-author').onchange = function (e) {
    showAuthor = e.target.checked;
    var authors = document.querySelectorAll('.note-author');
    for (var a = 0; a < authors.length; a++) {
      authors[a].style.display = showAuthor ? 'block' : 'none';
    }
  };

  var cards = document.querySelectorAll('[data-reveal]');
  for (var c = 0; c < cards.length; c++) {
    (function (card) {
      card.onclick = function () {
        if (card.getAttribute('data-revealed')) return;
        var parts = card.getAttribute('data-reveal').split('-');
        var tId = Number(parts[0]);
        var idx = Number(parts[1]);
        var note = result[tId][idx];
        card.setAttribute('data-revealed', '1');
        card.innerHTML =
          '<div class="note-unfolded"><p>' + escapeHtml(note.text) + '</p>' +
          (note.authorTeamId
            ? '<span class="note-author" style="display:' + (showAuthor ? 'block' : 'none') + '">— ' + TEAM_NAMES[note.authorTeamId - 1] + '</span>'
            : '') +
          '</div>';
      };
    })(cards[c]);
  }
}

function escapeHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function bindNavLinks() {
  var links = document.querySelectorAll('[data-nav]');
  for (var i = 0; i < links.length; i++) {
    links[i].onclick = function (e) {
      e.preventDefault();
      navigate(this.getAttribute('data-nav'));
    };
  }
}

function render() {
  var route = getRoute();
  if (route.page === 'team') renderTeam(route.teamId);
  else if (route.page === 'draw') renderDraw();
  else if (route.page === 'result') renderResult();
  else renderMain();
  bindNavLinks();
}

function boot() {
  try {
    app = document.getElementById('app');
    if (!app) return;
    if (!location.hash) location.hash = '/';
    render();
    window.addEventListener('hashchange', render);
  } catch (e) {
    if (app) {
      app.innerHTML = '<div style="padding:2rem;text-align:center"><h2>오류</h2><p>' + e.message + '</p></div>';
    }
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

</script>
</body>
</html>
